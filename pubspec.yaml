name: renta_fest
description: "Aplicacion para renta de articulos para eventos"
publish_to: 'none'

version: 1.0.0+9

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  share_plus: ^10.1.4
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  pdf: ^3.11.1
  printing: ^5.13.2
  http: ^1.2.1
  url_launcher: ^6.2.6
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#6C63FF"
  image: "assets/icon/icon.png"
  android_12:
    image: "assets/icon/icon.png"
    color: "#6C63FF"
